name: my-work-flow
on:
  push: # filters that is hitting those branches
    branches:
      - main
      - dev-*
    paths-ignore: ".github/workflows/*"
  pull_request: # activity types that is hitting those branches
    types: [opened, closed]
    branches:
      - main
      - dev-*
  workflow_dispatch:
jobs:
  clone-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Cloning the repo"
        uses: actions/checkout@v6
      - name: "Install Dependencies"
        run: npm ci
      - name: "Run the tests"
        run: npm test
      - name: "Deploy the code"
        run: echo "Deploying the code ${{toJson(github.event)}}"
