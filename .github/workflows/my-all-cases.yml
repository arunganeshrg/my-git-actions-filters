name: my-all-cases-workflow
on:
  push:
    branches:
      - main
      - dev-*
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev-*
    types: [closed]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull the code
        uses: actions/checkout@v4

      - name: Cache Dependencies
        uses: actions/cache@v3
        with: 
            path: ~/.npm
            key: dep-files-${{hashFiles('package-lock.json')}}

      - name: Install Dependencies
        run: npm ci

      - name: Linting the code
        run: npm run lint

      - name: Test the code
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Pull the code
        uses: actions/checkout@v4

      - name: Cache Dependencies
        uses: actions/cache@v3
        with: 
            path: ~/.npm
            key: dep-files-${{hashFiles('package-lock.json')}}

      - name: Install Dependencies
        run: npm ci

      - name: Build the code
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist
      - run: ls -R

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist
      - name: Deploy the code
        run: echo "Deploying the code ${{ github.event }}"